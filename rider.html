<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider - Book Karo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🚖 Rider Panel (Customer)</h2>
        <div id="map"></div>
        
        <div class="box">
            <h3>Book a Ride</h3>
            <p>Ride Status: <span class="status-badge" id="ride-status">No Active Booking</span></p>
            <div id="booking-form">
                <button id="btn-book" onclick="bookNewRide()">Request Ride (Rudrapur Area)</button>
            </div>
            <div id="ride-info" style="display:none; margin-top:15px;">
                <div class="data-row"><span>Active Ride ID:</span><span id="active-ride-id" style="font-weight:bold;">-</span></div>
                <div class="data-row"><span>Your Secret OTP:</span><span id="display-otp" style="font-weight:bold; color:green; font-size:18px;">-</span></div>
                <div class="data-row"><span>Driver Assigned:</span><span id="driver-name">Searching...</span></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="rider.js"></script>
</body>
</html>
